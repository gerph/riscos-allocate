name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python build tooling
        run: python -m pip install --upgrade build pip

      - name: Build Python distribution
        run: make dist

      - name: Build PRM-in-XML documentation
        uses: gerph/riscos-prminxml-action@v1
        with:
          files: prminxml/allocateformat.xml prminxml/riscos-allocate.xml
          output: build/docs/html
          style: prm

      - name: Upload Python distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: build/docs/html/
